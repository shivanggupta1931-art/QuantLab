<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantLab | Challenge</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/challenge.css">
    <link rel="stylesheet" href="css/header.css">
</head>
<body>
   
    
    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            📈 <span>QuantLab</span>
        </div>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="challenge.html" class="active">Challenge</a>
            <a href="replay.html">Replay</a>
        </nav>

    </header>
        
    <main class="challenge-container">



        <div class="challenge-header">
            <h1>Daily Quant Challenge</h1>
            <p>Sharpen your probability, logic and market reasoning.</p>
        </div>


        <!-- Daily progress tracking -->
        <div class="daily-progress-card">

            <div class="progress-item">
                <span>Streak 🔥</span>
                <h2 id="dailyStreak">0</h2>
            </div>
            <div class="progress-item">
                <span>🎯 Progress</span>
                <h2 id="dailyProgress">0/10</h2>
            </div>
            <div class="progress-item">
                <span>✅ Accuracy</span>
                <h2 id="dailyAccuracy">0%</h2>
            </div>

            <div class="progress-item">
                <span>⭐ XP</span>
                <h2 id="dailyXP">0</h2>
            </div>



            
        </div>










        <!-- TOP INFORMATION -->
        <section class="challenge-top">
            <div class="badge">
                <span id="category">Probability</span>
            </div>
            <div class="badge">
                <span id="difficulty">Easy</span>
            </div>
            
        </section>



         <!-- QUESTION CARD -->

        <section class="challenge-card">
            <div class="question-number">
                Question <span id="questionNumber">1</span>
            </div>

            <h2 id="questionText">Loading questions..</h2>

            <div class="options">
                <button class="option-btn" data-index="0"></button>
                <button class="option-btn" data-index="1"></button> 
                <button class="option-btn" data-index="2"></button> 
                <button class="option-btn" data-index="3"></button> 
            </div>
        </section>




         <!-- HINT -->
        <section class="hint-card">
        <button id="hintBtn">
            ShowHint
        </button>
        <p id="hintText"></p>
        </section>


          <!-- RESULT -->
        <section class="result-card">
            <div id="resultMessage">
                
            </div>
            <p id="explanationText"></p>
        </section>




        <!-- ACTION -->
        <section class="challenge-actions">
            <button id="submitBtn">Submit Answer</button>
            <button id="nextBtn">Next Challenge-></button>
        </section>


    </main>
<script src="js/challenge/challengeLoader.js"></script>
<script src="js/challenge/challengeEngine.js"></script>


<script src="js/challenge/progress.js"></script>

<script src="js/challenge/challengeUI.js"></script>
<script src="js/challenge/challengeApp.js"></script>
    
    
</body>
</html>
